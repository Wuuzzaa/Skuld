services:
  db:
    image: postgres:15-alpine
    container_name: postgres_setup-db-1
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Skuld}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      postgres_setup_default:
        aliases:
          - postgres_setup-db-1
          - postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-Skuld}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: postgres_setup-pgadmin-1
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@skuld.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "127.0.0.1:5053:80"
    networks:
      - postgres_setup_default
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  postgres_setup_default:
    external: true
