name: "Trigger Jobs"

# ============================================================================
# Manual trigger for remote jobs on a single selected target.
#
# Configuration:
#   - Environment-specific settings from ops/environments.yaml
#   - Shared secrets as Repository Secrets
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target server"
        required: true
        type: choice
        options:
          - production
          - home
        default: production
      job:
        description: "Job to trigger on that server"
        required: true
        type: choice
        options:
          - saturday_night
          - option_data
          - market_start_mid_end
          - stock_data_daily
          - historization
          - db_backup
          - db_healthcheck
      dry_run:
        description: "Dry run (show command only)"
        type: boolean
        default: false

jobs:
  load-config:
    name: Load environment config
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.parse.outputs.host }}
      user: ${{ steps.parse.outputs.user }}
      db_container: ${{ steps.parse.outputs.db_container }}
      compose_args: ${{ steps.parse.outputs.compose_args }}
      telegram_chat_id: ${{ steps.parse.outputs.telegram_chat_id }}
      skuld_env: ${{ steps.parse.outputs.skuld_env }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse environments.yaml
        id: parse
        run: |
          python3 - "${{ inputs.target }}" <<'PYEOF'
          import yaml, sys, os
          target = sys.argv[1]
          with open("ops/environments.yaml") as f:
              cfg = yaml.safe_load(f)
          if target not in cfg:
              print(f"::error::Unknown target '{target}'. Available: {list(cfg.keys())}")
              sys.exit(1)
          env = cfg[target]
          gh = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(gh, "a") as out:
              for key in ["host", "user", "db_container", "compose_args", "telegram_chat_id", "skuld_env"]:
                  out.write(f"{key}={env[key]}\n")
          PYEOF

  trigger:
    name: "${{ inputs.target }}: ${{ inputs.job }}"
    needs: load-config
    runs-on: ${{ inputs.target == 'home' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 360
    env:
      TARGET_LABEL: ${{ needs.load-config.outputs.skuld_env }}
      DEPLOY_HOST: ${{ needs.load-config.outputs.host }}
      DEPLOY_USER: ${{ needs.load-config.outputs.user }}
      DB_CONTAINER: ${{ needs.load-config.outputs.db_container }}
      COMPOSE_CMD: docker compose ${{ needs.load-config.outputs.compose_args }}

    steps:
      - name: Initialize
        id: init
        run: |
          echo "## Trigger Job - ${{ env.TARGET_LABEL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${{ inputs.target }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Job | ${{ inputs.job }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Started at | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify start via Telegram
        if: ${{ inputs.dry_run == false }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ needs.load-config.outputs.telegram_chat_id }}
        run: |
          TEXT="⚡ <b>[${{ env.TARGET_LABEL }}] Manual Job gestartet</b>%0A%0A👤 <b>${{ github.actor }}</b>%0A🎯 <code>${{ inputs.job }}</code>"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Prepare remote command
        id: cmd
        run: |
          JOB="${{ inputs.job }}"

          if [ "$JOB" = "db_backup" ]; then
            DESCRIPTION="Database backup"
            cat > /tmp/remote_cmd.sh <<EOF
            set -euo pipefail
            TIMESTAMP=\$(date -u '+%Y%m%d_%H%M%S')
            BACKUP_DIR=\$HOME/backups/postgres
            BACKUP_FILE="\${BACKUP_DIR}/skuld_manual_\${TIMESTAMP}.sql.gz"
            mkdir -p "\${BACKUP_DIR}"
            echo "Starting pg_dump from ${{ env.DB_CONTAINER }}..."
            docker exec ${{ env.DB_CONTAINER }} pg_dump -U admin -d Skuld | gzip > "\${BACKUP_FILE}"
            FILESIZE=\$(du -h "\${BACKUP_FILE}" | cut -f1)
            echo "Backup complete: \${BACKUP_FILE} (\${FILESIZE})"
            ls -t "\${BACKUP_DIR}"/skuld_manual_*.sql.gz 2>/dev/null | tail -n +4 | xargs -r rm -f
          EOF
          elif [ "$JOB" = "db_healthcheck" ]; then
            DESCRIPTION="Database healthcheck"
            cat > /tmp/remote_cmd.sh <<EOF
            set -euo pipefail
            echo "=== Docker containers ==="
            ${{ env.COMPOSE_CMD }} -f /opt/skuld/docker-compose.yml ps 2>/dev/null || docker ps --format 'table {{.Names}}\t{{.Status}}' || true
            echo
            echo "=== PostgreSQL ping ==="
            docker exec ${{ env.DB_CONTAINER }} psql -U admin -d Skuld -c "select now() as db_time, current_database() as db_name;"
            echo
            echo "=== Required view check ==="
            docker exec ${{ env.DB_CONTAINER }} psql -U admin -d Skuld -tAc "select 1 from pg_views where viewname = 'OptionDataMerged';"
            echo
            echo "=== View list filter ==="
            docker exec ${{ env.DB_CONTAINER }} psql -U admin -d Skuld -c "\dv" | grep OptionDataMerged
          EOF
          else
            DESCRIPTION="Data collection: ${JOB}"
            cat > /tmp/remote_cmd.sh <<EOF
            set -euo pipefail
            docker exec skuld-backend /bin/bash /app/Skuld/run_data_collection.sh ${JOB}
          EOF
          fi

          chmod 700 /tmp/remote_cmd.sh
          echo "description=${DESCRIPTION}" >> $GITHUB_OUTPUT
          echo "### Command to execute" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          cat /tmp/remote_cmd.sh >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Dry run
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dry run only. Nothing was executed on the target server." >> $GITHUB_STEP_SUMMARY

      - name: Execute on remote server
        if: ${{ inputs.dry_run == false }}
        id: execute
        run: |
          set +e
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=5 \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} 'bash -s' < /tmp/remote_cmd.sh > /tmp/remote_output.txt 2>&1
          EXIT_CODE=$?
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Execution output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '<details><summary>Output (last 100 lines)</summary>' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/remote_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '</details>' >> $GITHUB_STEP_SUMMARY

          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

      - name: Calculate duration
        if: always()
        run: |
          START=${{ steps.init.outputs.start_time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINS=$((DURATION / 60))
          SECS=$((DURATION % 60))
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Total duration: ${MINS}m ${SECS}s" >> $GITHUB_STEP_SUMMARY

      - name: Notify result via Telegram
        if: ${{ always() && inputs.dry_run == false }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ needs.load-config.outputs.telegram_chat_id }}
        run: |
          STATUS="${{ job.status }}"
          ICON="❌"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          fi

          START=${{ steps.init.outputs.start_time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINS=$((DURATION / 60))
          SECS=$((DURATION % 60))

          TEXT="${ICON} <b>[${{ env.TARGET_LABEL }}] Manual Job ${STATUS}</b>%0A%0A👤 <b>${{ github.actor }}</b>%0A🎯 ${{ steps.cmd.outputs.description }}%0A⏱️ ${MINS}m ${SECS}s"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true
