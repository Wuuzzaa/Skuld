name: "Trigger Jobs"

# ============================================================================
# Manual trigger for remote jobs (data collection, DB backup, healthcheck).
#
# SSHs into the target server and runs commands remotely.
# Uses the same GitHub Environments as deploy.yml (production / dev-hetzner).
#
# Available jobs:
#   - Data collection modes (run inside skuld-backend container)
#   - PostgreSQL database backup (pg_dump on postgres container)
#   - Database healthcheck
#
# Progress & results are reported via GitHub Job Summary + Telegram.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - production
          - dev
        default: production
      job:
        description: "Job to trigger"
        required: true
        type: choice
        options:
          - saturday_night
          - option_data
          - market_start_mid_end
          - stock_data_daily
          - historization
          - db_backup
          - db_healthcheck
      dry_run:
        description: "Dry run (only show what would be executed)"
        type: boolean
        default: false

jobs:
  trigger:
    name: "${{ inputs.target }}: ${{ inputs.job }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'production' && 'production' || 'dev-hetzner' }}
    timeout-minutes: 360
    env:
      TARGET_LABEL: ${{ inputs.target == 'production' && 'Production' || 'Dev' }}

    steps:
      - name: "Initialize"
        id: init
        run: |
          echo "## Trigger Job — ${{ env.TARGET_LABEL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | \`${{ inputs.target }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Job** | \`${{ inputs.job }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry Run** | \`${{ inputs.dry_run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Started at** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: "Notify start via Telegram"
        if: ${{ inputs.dry_run == false }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          JOB="${{ inputs.job }}"
          ACTOR="${{ github.actor }}"
          LABEL="${{ env.TARGET_LABEL }}"
          TEXT="⚡ <b>[${LABEL}] Manual Job gestartet</b>%0A%0A👤 <b>${ACTOR}</b>%0A🎯 Job: <code>${JOB}</code>"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true

      - name: "Setup SSH Key"
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: "Prepare command"
        id: cmd
        run: |
          JOB="${{ inputs.job }}"

          if [ "$JOB" = "db_backup" ]; then
            REMOTE_CMD=$(cat <<'CMD'
          set -euo pipefail
          TIMESTAMP=$(date -u '+%Y%m%d_%H%M%S')
          BACKUP_DIR=~/backups/postgres
          mkdir -p "$BACKUP_DIR"
          BACKUP_FILE="$BACKUP_DIR/skuld_manual_${TIMESTAMP}.sql.gz"
          echo "Starting pg_dump..."
          docker exec postgres_setup-db-1 pg_dump -U admin -d Skuld | gzip > "$BACKUP_FILE"
          FILESIZE=$(du -h "$BACKUP_FILE" | cut -f1)
          echo "Backup complete: $BACKUP_FILE ($FILESIZE)"
          ls -t "$BACKUP_DIR"/skuld_manual_*.sql.gz 2>/dev/null | tail -n +3 | xargs rm -f 2>/dev/null || true
          echo "BACKUP_FILE=$BACKUP_FILE"
          echo "BACKUP_SIZE=$FILESIZE"
          CMD
          )
            DESCRIPTION="Database Backup (pg_dump)"
          elif [ "$JOB" = "db_healthcheck" ]; then
            REMOTE_CMD=$(cat <<'CMD'
          set -euo pipefail
          echo "=== Docker containers ==="
          docker compose -f /opt/skuld/docker-compose.yml ps || true
          echo ""
          echo "=== PostgreSQL ping ==="
          docker exec postgres_setup-db-1 psql -U admin -d Skuld -c "select now() as db_time, current_database() as db_name;"
          echo ""
          echo "=== Required view check ==="
          docker exec postgres_setup-db-1 psql -U admin -d Skuld -tAc "select 1 from pg_views where viewname = 'OptionDataMerged';"
          echo ""
          echo "=== View list filter ==="
          docker exec postgres_setup-db-1 psql -U admin -d Skuld -c "\dv" | grep OptionDataMerged
          CMD
          )
            DESCRIPTION="Database Healthcheck"
          else
            REMOTE_CMD="docker exec skuld-backend /bin/bash /app/Skuld/run_data_collection.sh ${JOB}"
            DESCRIPTION="Data Collection: ${JOB}"
          fi

          echo "description=${DESCRIPTION}" >> $GITHUB_OUTPUT
          echo "$REMOTE_CMD" > /tmp/remote_cmd.sh

          echo "### Command to execute" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "$REMOTE_CMD" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: "Dry run - skipping execution"
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "### Dry Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "No command was executed on the server." >> $GITHUB_STEP_SUMMARY

      - name: "Execute on remote server"
        if: ${{ inputs.dry_run == false }}
        id: execute
        run: |
          echo "### Execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          JOB="${{ inputs.job }}"

          if [ "$JOB" = "db_backup" ]; then
            OUTPUT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=5 \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' < /tmp/remote_cmd.sh 2>&1) || {
              EXIT_CODE=$?
              echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
              echo "Command failed with exit code ${EXIT_CODE}" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              exit $EXIT_CODE
            }
          else
            REMOTE_CMD=$(cat /tmp/remote_cmd.sh)
            OUTPUT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=5 \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "${REMOTE_CMD}" 2>&1) || {
              EXIT_CODE=$?
              echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
              echo "Command failed with exit code ${EXIT_CODE}" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              exit $EXIT_CODE
            }
          fi

          echo "exit_code=0" >> $GITHUB_OUTPUT
          echo "Command completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Output (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" | tail -100 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: "Calculate duration"
        if: always()
        run: |
          START=${{ steps.init.outputs.start_time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINS=$((DURATION / 60))
          SECS=$((DURATION % 60))
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Total duration:** ${MINS}m ${SECS}s" >> $GITHUB_STEP_SUMMARY

      - name: "Notify result via Telegram"
        if: ${{ always() && inputs.dry_run == false }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          JOB="${{ inputs.job }}"
          ACTOR="${{ github.actor }}"
          STATUS="${{ job.status }}"
          DESCRIPTION="${{ steps.cmd.outputs.description }}"
          LABEL="${{ env.TARGET_LABEL }}"

          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi

          START=${{ steps.init.outputs.start_time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINS=$((DURATION / 60))
          SECS=$((DURATION % 60))

          TEXT="${ICON} <b>[${LABEL}] Manual Job ${STATUS}</b>%0A%0A👤 <b>${ACTOR}</b>%0A🎯 ${DESCRIPTION}%0A⏱️ ${MINS}m ${SECS}s"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true
