name: Deploy Monitoring (Hetzner Server)

on:
  push:
    branches: [ master ]
    paths:
      - 'monitoring/hetzner/**'
      - '.github/workflows/deploy-monitoring-hetzner.yml'

jobs:
  deploy-hetzner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            _DEPLOY_PASS='${{ secrets.DEPLOY_PASSWORD }}'
            if [ -n "$_DEPLOY_PASS" ]; then
              mysudo() { echo "$_DEPLOY_PASS" | sudo -S "$@"; }
            else
              mysudo() { sudo "$@"; }
            fi
            mysudo mkdir -p /opt/monitoring-hetzner
            mysudo chown -R $(whoami) /opt/monitoring-hetzner
          ENDSSH

      - name: Sync files to Hetzner server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            monitoring/hetzner/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/monitoring-hetzner/
            
      - name: Build and deploy Hetzner Monitoring
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -euo pipefail

            # Flexible sudo: password if DEPLOY_PASSWORD exists, plain sudo otherwise
            _DEPLOY_PASS='${{ secrets.DEPLOY_PASSWORD }}'
            if [ -n "$_DEPLOY_PASS" ]; then
              mysudo() { echo "$_DEPLOY_PASS" | sudo -S "$@"; }
            else
              mysudo() { sudo "$@"; }
            fi

            cd /opt/monitoring-hetzner
            mysudo docker compose pull
            mysudo docker compose up -d --remove-orphans
          ENDSSH
