name: "Replicate DB To Home"

# ============================================================================
# Copy the latest DB backup from a source environment to the home server.
#
# Runs entirely on the self-hosted runner (home server):
#   1. SCP backup directly from source server to local /tmp/
#   2. Restore into the local staging DB container
#
# No GitHub Environments needed — uses Repository Secrets + environments.yaml.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source environment to pull DB from"
        required: true
        type: choice
        options:
          - production
        default: production
      backup_path:
        description: "Optional: specific backup path on source (default: latest)"
        required: false
        default: ""
      restart_app:
        description: "Restart frontend/backend after restore"
        type: boolean
        default: true
      confirm_restore:
        description: "Type RESTORE_HOME_DB to confirm replacing the home-server database"
        required: true
        default: ""

jobs:
  replicate:
    name: "Replicate DB: ${{ inputs.source }} → home"
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm_restore }}" != "RESTORE_HOME_DB" ]; then
            echo "::error::Confirmation missing. Set confirm_restore=RESTORE_HOME_DB."
            exit 1
          fi

      - name: Checkout for config
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Notify start via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-5262458068"
        run: |
          TEXT="🔄 <b>DB Replication gestartet</b>%0A%0A📥 Source: ${{ inputs.source }}%0A👤 ${{ github.actor }}%0A%0A⚠️ Alle Jobs werden gestoppt bis Restore abgeschlossen ist."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true

      - name: Load config
        id: config
        run: |
          python3 - "${{ inputs.source }}" <<'PYEOF'
          import yaml, sys, os
          source = sys.argv[1]
          with open("ops/environments.yaml") as f:
              cfg = yaml.safe_load(f)

          src = cfg[source]
          home = cfg["home"]
          gh = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(gh, "a") as out:
              out.write(f"source_host={src['host']}\n")
              out.write(f"source_user={src['user']}\n")
              out.write(f"home_db_container={home['db_container']}\n")
              out.write(f"home_compose_args={home['compose_args']}\n")
              out.write(f"home_telegram_chat_id={home['telegram_chat_id']}\n")
          PYEOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Find latest backup on source
        id: find_backup
        run: |
          SOURCE_HOST="${{ steps.config.outputs.source_host }}"
          SOURCE_USER="${{ steps.config.outputs.source_user }}"
          REQUESTED_PATH="${{ inputs.backup_path }}"

          if [ -n "$REQUESTED_PATH" ]; then
            BACKUP_PATH="$REQUESTED_PATH"
          else
            BACKUP_PATH=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${SOURCE_USER}@${SOURCE_HOST} \
              'ls -t ~/backups/postgres/skuld_*.sql.gz ~/backups/postgres/skuld_manual_*.sql.gz 2>/dev/null | head -n 1')
          fi

          if [ -z "$BACKUP_PATH" ]; then
            echo "::error::No backup found on ${{ inputs.source }}."
            exit 1
          fi

          BACKUP_NAME=$(basename "$BACKUP_PATH")
          echo "backup_path=$BACKUP_PATH" >> $GITHUB_OUTPUT
          echo "backup_name=$BACKUP_NAME" >> $GITHUB_OUTPUT
          echo "Found backup: $BACKUP_PATH"

      - name: Download backup from source
        run: |
          echo "Downloading ${{ steps.find_backup.outputs.backup_name }} from ${{ inputs.source }}..."
          DEST="/tmp/${{ steps.find_backup.outputs.backup_name }}"

          # Get remote file size for progress calculation
          REMOTE_SIZE=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ steps.config.outputs.source_user }}@${{ steps.config.outputs.source_host }} \
            "stat --printf='%s' ${{ steps.find_backup.outputs.backup_path }}" 2>/dev/null || echo "0")

          if [ "$REMOTE_SIZE" -gt 0 ]; then
            REMOTE_SIZE_MB=$((REMOTE_SIZE / 1024 / 1024))
            echo "Remote file size: ${REMOTE_SIZE_MB} MB"
          fi

          # Start SCP in background
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ steps.config.outputs.source_user }}@${{ steps.config.outputs.source_host }}:${{ steps.find_backup.outputs.backup_path }} \
            "$DEST" &
          SCP_PID=$!

          # Log progress every 30s
          while kill -0 $SCP_PID 2>/dev/null; do
            if [ -f "$DEST" ]; then
              CURRENT=$(du -m "$DEST" 2>/dev/null | cut -f1)
              if [ "$REMOTE_SIZE" -gt 0 ]; then
                PCT=$((CURRENT * 100 / REMOTE_SIZE_MB))
                echo "  Progress: ${CURRENT} MB / ${REMOTE_SIZE_MB} MB (${PCT}%)"
              else
                echo "  Downloaded so far: ${CURRENT} MB"
              fi
            fi
            sleep 30
          done

          wait $SCP_PID
          FILESIZE=$(du -h "$DEST" | cut -f1)
          echo "Download complete: ${FILESIZE}"

      - name: Stop ALL app containers (kill DB connections)
        run: |
          echo "Stopping all application containers that may hold DB connections..."
          docker stop skuld-backend skuld-frontend skuld-api skuld-react 2>/dev/null || true
          echo "Waiting 5s for connections to fully close..."
          sleep 5

      - name: Restore backup
        run: |
          set -euo pipefail
          DB_CONTAINER="${{ steps.config.outputs.home_db_container }}"
          BACKUP_FILE="/tmp/${{ steps.find_backup.outputs.backup_name }}"

          echo "Force-terminating ALL remaining database connections..."
          docker exec "$DB_CONTAINER" psql -U admin -d postgres -c \
            "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'Skuld' AND pid <> pg_backend_pid();" || true

          echo "Dropping Skuld database..."
          docker exec "$DB_CONTAINER" psql -U admin -d postgres -c \
            'DROP DATABASE IF EXISTS "Skuld";'

          echo "Creating fresh Skuld database..."
          docker exec "$DB_CONTAINER" psql -U admin -d postgres -c \
            'CREATE DATABASE "Skuld";'

          echo "Restoring backup (this may take a while for large dumps)..."
          gzip -dc "$BACKUP_FILE" | docker exec -i "$DB_CONTAINER" psql -U admin -d Skuld

          echo "Restore complete."

      - name: Reset migration flag so backend re-runs migrations on next start
        if: ${{ inputs.restart_app }}
        run: |
          docker exec skuld-backend rm -f /app/.migrations_done 2>/dev/null || true

      - name: Start app containers
        if: ${{ inputs.restart_app }}
        run: |
          docker restart skuld-backend skuld-frontend skuld-api skuld-react 2>/dev/null || true
          echo "Waiting 15s for backend to connect to DB and run migrations..."
          sleep 15

      - name: Verify DB connectivity
        run: |
          docker exec ${{ steps.config.outputs.home_db_container }} \
            psql -U admin -d Skuld -c "SELECT NOW() as restored_at, pg_database_size(current_database()) as db_size_bytes;"

      - name: Clean up temp file
        if: always()
        run: |
          rm -f /tmp/skuld_*.sql.gz 2>/dev/null || true

      - name: Notify via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ steps.config.outputs.home_telegram_chat_id }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          TEXT="${ICON} <b>DB Replication ${STATUS}</b>%0A%0A📥 Source: ${{ inputs.source }}%0A📦 Backup: ${{ steps.find_backup.outputs.backup_name }}%0A👤 ${{ github.actor }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true

      - name: Write summary
        if: always()
        run: |
          echo "## DB Replication: ${{ inputs.source }} → home" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source | ${{ inputs.source }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backup | ${{ steps.find_backup.outputs.backup_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Restart app | ${{ inputs.restart_app }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
