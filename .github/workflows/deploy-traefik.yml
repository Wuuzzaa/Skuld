name: Deploy Traefik Production

on:
  push:
    branches: [ master ]
    paths:
      - 'traefik/**'
      - '.github/workflows/deploy-traefik.yml'

concurrency:
  group: deploy-production-traefik
  cancel-in-progress: false

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.config.outputs.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Read deploy target
        id: config
        run: |
          source ops/deploy-target.env
          echo "target=$DEPLOY_TARGET" >> $GITHUB_OUTPUT
          echo "📍 Traefik target: **$DEPLOY_TARGET**" >> $GITHUB_STEP_SUMMARY

  deploy-traefik:
    needs: resolve-target
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-target.outputs.target }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "echo '${{ secrets.DEPLOY_PASSWORD }}' | sudo -S mkdir -p /opt/traefik/dynamic /opt/traefik/letsencrypt && \
             echo '${{ secrets.DEPLOY_PASSWORD }}' | sudo -S chown -R ${{ secrets.DEPLOY_USER }} /opt/traefik"

      - name: Sync Traefik files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude 'letsencrypt/' \
            --exclude '.env' \
            traefik/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/traefik/

      - name: Deploy Traefik stack
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -euo pipefail

            DEPLOY_PASS="${{ secrets.DEPLOY_PASSWORD }}"
            TRAEFIK_ACME_EMAIL="${{ secrets.TRAEFIK_ACME_EMAIL }}"
            if [ -z "$TRAEFIK_ACME_EMAIL" ]; then
              TRAEFIK_ACME_EMAIL="admin@skuld-options.com"
            fi

            mysudo() {
              echo "$DEPLOY_PASS" | sudo -S "$@"
            }

            cd /opt/traefik

            mkdir -p dynamic letsencrypt

            if ! mysudo docker network inspect web >/dev/null 2>&1; then
              mysudo docker network create web
            fi

            touch letsencrypt/acme.json
            chmod 600 letsencrypt/acme.json

            printf '%s\n' "TRAEFIK_ACME_EMAIL=${TRAEFIK_ACME_EMAIL}" > .env

            mysudo docker compose down --remove-orphans || true
            mysudo docker compose pull
            mysudo docker compose up -d --remove-orphans

            for attempt in $(seq 1 20); do
              container_state=$(mysudo docker inspect --format '{{.State.Status}}' traefik 2>/dev/null || true)
              health_state=$(mysudo docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' traefik 2>/dev/null || true)

              echo "Traefik status check ${attempt}: state=${container_state:-unknown}, health=${health_state:-unknown}"

              if [ "$container_state" = "running" ] && { [ "$health_state" = "healthy" ] || [ "$health_state" = "none" ]; }; then
                break
              fi

              if [ "$container_state" = "exited" ] || [ "$container_state" = "dead" ]; then
                mysudo docker compose ps
                mysudo docker compose logs --tail=100
                echo "Traefik container is not running."
                exit 1
              fi

              if [ "$attempt" -eq 20 ]; then
                mysudo docker compose ps
                mysudo docker compose logs --tail=100
                echo "Traefik healthcheck did not turn healthy in time, but container is running. Continuing deployment."
                break
              fi

              sleep 5
            done

            mysudo docker compose ps
          ENDSSH
