name: Deploy SKULD Dev to Hetzner

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: master

concurrency:
  group: deploy-skuld-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy to Skuld-dev
    runs-on: ubuntu-latest
    environment: dev-hetzner
    env:
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      AUTH_DOMAIN: ${{ vars.AUTH_DOMAIN }}
      TRAEFIK_ENTRYPOINT: ${{ vars.TRAEFIK_ENTRYPOINT }}
      TRAEFIK_CERTRESOLVER_LABEL_SKULD: ${{ vars.TRAEFIK_CERTRESOLVER_LABEL_SKULD }}
      TRAEFIK_CERTRESOLVER_LABEL_AUTHELIA: ${{ vars.TRAEFIK_CERTRESOLVER_LABEL_AUTHELIA }}
      AUTH_SCHEME: ${{ vars.AUTH_SCHEME }}
      POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Notify deploy started via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_DEV || secrets.TELEGRAM_CHAT_ID }}
        run: |
          ACTOR="${{ github.actor }}"
          BRANCH="${{ inputs.ref || github.ref_name }}"
          COMMIT_MSG=$(git log -1 --format='%s')
          SHORT_SHA=$(git rev-parse --short HEAD)
          REPO="${{ github.repository }}"
          TEXT="🚀 <b>[Dev] Deploy gestartet</b>%0A%0A👤 <b>${ACTOR}</b> deployed <code>${BRANCH}</code>.%0A📝 <code>${SHORT_SHA}</code>: ${COMMIT_MSG}%0A📦 ${REPO}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo mkdir -p /opt/skuld && sudo chown -R ${{ secrets.DEPLOY_USER }} /opt/skuld"

      - name: Sync files to dev server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectionAttempts=1" \
            --exclude 'logs/' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude 'authelia/users_database.yml' \
            --exclude 'authelia/db.sqlite3' \
            --exclude 'authelia/notification.txt' \
            --exclude 'authelia/session_secret' \
            --exclude 'authelia/jwt_secret' \
            --exclude 'authelia/storage_encryption_key' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/skuld/

      - name: Get version
        id: get_version
        run: |
          COUNT=$(git rev-list --count HEAD)
          HASH=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M')
          echo "VERSION=${COUNT}-${HASH} (${DATE})" >> $GITHUB_OUTPUT

      - name: Build and deploy Docker container (Dev)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -euo pipefail

            cd /opt/skuld

            echo "=== Creating .env file ==="
            echo "DOMAIN_NAME=${{ vars.DOMAIN_NAME }}" > .env
            echo "AUTH_DOMAIN=${{ vars.AUTH_DOMAIN }}" >> .env
            echo "TRAEFIK_ENTRYPOINT=${{ vars.TRAEFIK_ENTRYPOINT }}" >> .env
            echo "TRAEFIK_CERTRESOLVER_LABEL_SKULD=${{ vars.TRAEFIK_CERTRESOLVER_LABEL_SKULD }}" >> .env
            echo "TRAEFIK_CERTRESOLVER_LABEL_AUTHELIA=${{ vars.TRAEFIK_CERTRESOLVER_LABEL_AUTHELIA }}" >> .env
            echo "AUTH_SCHEME=${{ vars.AUTH_SCHEME }}" >> .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID_DEV || secrets.TELEGRAM_CHAT_ID }}" >> .env
            echo "MASSIVE_API_KEY=${{ secrets.MASSIVE_API_KEY }}" >> .env
            echo "MASSIVE_API_KEY_FLAT_FILES=${{ secrets.MASSIVE_API_KEY_FLAT_FILES }}" >> .env
            echo "SKULD_VERSION=${{ steps.get_version.outputs.VERSION }}" >> .env
            echo "POSTGRES_HOST=${{ vars.POSTGRES_HOST }}" >> .env
            echo "POSTGRES_DB=${{ vars.POSTGRES_DB }}" >> .env
            echo "POSTGRES_USER=${{ vars.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_PORT=${{ vars.POSTGRES_PORT }}" >> .env

            echo "=== Creating Authelia configuration ==="
            mkdir -p authelia
            echo "${{ secrets.AUTHELIA_JWT_SECRET }}" > authelia/jwt_secret
            echo "${{ secrets.AUTHELIA_SESSION_SECRET }}" > authelia/session_secret
            echo "${{ secrets.AUTHELIA_STORAGE_ENCRYPTION_KEY }}" > authelia/storage_encryption_key

            AUTHELIA_HASH='${{ secrets.AUTHELIA_PASSWORD_HASH }}'
            echo "users:" > authelia/users_database.yml
            echo "  admin:" >> authelia/users_database.yml
            echo "    displayname: \"Dev Admin\"" >> authelia/users_database.yml
            echo "    password: \"$AUTHELIA_HASH\"" >> authelia/users_database.yml
            echo "    email: admin@dev.skuld.com" >> authelia/users_database.yml
            echo "    groups:" >> authelia/users_database.yml
            echo "      - admins" >> authelia/users_database.yml
            echo "      - dev" >> authelia/users_database.yml

            echo "=== Ensuring logs directory exists ==="
            mkdir -p logs

            echo "=== Stopping old containers ==="
            sudo docker rm -f skuld-streamlit 2>/dev/null || true
            sudo docker rm -f skuld-frontend 2>/dev/null || true
            sudo docker rm -f skuld-backend 2>/dev/null || true
            sudo docker rm -f authelia 2>/dev/null || true
            sudo docker ps -a --filter "name=authelia" -q | xargs -r sudo docker rm -f 2>/dev/null || true
            sudo docker ps -a --filter "name=skuld" -q | xargs -r sudo docker rm -f 2>/dev/null || true
            sudo docker compose down --remove-orphans || true

            echo "=== Building image ==="
            sudo docker compose build --pull --no-cache

            echo "=== Starting containers ==="
            sudo docker compose up -d --remove-orphans

            echo "=== Cleaning old images ==="
            sudo docker image prune -f

            echo "=== Container status ==="
            sudo docker compose ps

            echo "=== Container logs ==="
            sudo docker compose logs --tail=50
          ENDSSH

      - name: Notify deploy success via Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_DEV || secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_MSG=$(git log -1 --format='%s')
          SHORT_SHA=$(git rev-parse --short HEAD)
          TEXT="✅ <b>[Dev] Deploy erfolgreich</b>%0A%0A📝 <code>${SHORT_SHA}</code>: ${COMMIT_MSG}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true

      - name: Notify deploy failure via Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_DEV || secrets.TELEGRAM_CHAT_ID }}
        run: |
          ACTOR="${{ github.actor }}"
          COMMIT_MSG=$(git log -1 --format='%s')
          SHORT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="❌ <b>[Dev] Deploy fehlgeschlagen</b>%0A%0A👤 ${ACTOR}%0A📝 <code>${SHORT_SHA}</code>: ${COMMIT_MSG}%0A🔗 <a href=\"${RUN_URL}\">Build Logs ansehen</a>"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode=HTML >/dev/null 2>&1 || true