# SKULD Provisioning Configuration
# Override these values for your environment.
# This file is sourced by provision-server.sh if present in the same directory.

# GitHub repository
GITHUB_REPO="Wuuzzaa/Skuld"

# GitHub Actions Runner version (pin for reproducibility)
# Check latest: https://github.com/actions/runner/releases
RUNNER_VERSION="2.334.0"

# Deploy user settings
DEPLOY_USER="deploy"
APP_DIR="/opt/skuld"

# Docker networks required by SKULD
DOCKER_NETWORKS="web postgres_setup_default"

# Firewall ports to allow (TCP)
UFW_ALLOW_PORTS="22 80 443"

# SSH public keys to authorize for the deploy user.
# One key per line. All listed keys can SSH in as 'deploy'.
# Add new developers here and re-run the script.
SSH_AUTHORIZED_KEYS="
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPlease_Replace_With_Daniels_Key daniel@skuld
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPlease_Replace_With_Jakobs_Key jakob@skuld
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPlease_Replace_With_Jonas_Key jonas@skuld
"
