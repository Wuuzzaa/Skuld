# SKULD Environment Configuration
#
# This file defines ALL environment-specific settings.
# Shared secrets (API keys, bot token, DB password, Authelia) are stored
# as GitHub Repository Secrets — not per-environment.
#
# To add a new server, run: skuld setup
# The wizard writes the new entry automatically.

production:
  host: <PROD-HOST>
  user: deploy
  runner: ubuntu-latest
  domain: <PROD-DOMAIN>
  auth_domain: <PROD-AUTH-DOMAIN>
  telegram_chat_id: <PROD-TELEGRAM-CHAT-ID>
  db_container: postgres_setup-db-1
  compose_args: "-f docker-compose.yml"
  traefik_entrypoint: websecure
  certresolver_skuld: "traefik.http.routers.skuld.tls.certresolver=letsencrypt"
  certresolver_authelia: "traefik.http.routers.authelia.tls.certresolver=letsencrypt"
  auth_scheme: https
  authelia: "true"
  skuld_middlewares: "authelia"
  skuld_env: Production
  deploy_services: ""
  skip_compose_down: "false"
  postgres_host: postgres_setup-db-1
  postgres_db: Skuld
  postgres_user: admin
  postgres_port: "5432"

home:
  host: localhost
  user: deploy
  runner: self-hosted
  domain: <HOME-DOMAIN>
  auth_domain: <HOME-AUTH-DOMAIN>
  telegram_chat_id: <HOME-TELEGRAM-CHAT-ID>
  db_container: skuld_staging_db
  compose_args: "-f docker-compose.yml -f docker-compose.testing.yml"
  traefik_entrypoint: web
  certresolver_skuld: "traefik.enable=true"
  certresolver_authelia: "traefik.enable=true"
  auth_scheme: http
  authelia: "true"
  skuld_middlewares: "force-https,authelia"
  skuld_env: Staging
  deploy_services: "skuld-frontend skuld-backend"
  skip_compose_down: "true"
  postgres_host: postgres
  postgres_db: Skuld
  postgres_user: admin
  postgres_port: "5432"
