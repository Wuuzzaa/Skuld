# Docker Compose for SKULD React Frontend + FastAPI Backend
# Runs PARALLEL to existing Streamlit on its own subdomain.
#
# Required env vars (set in .env or via deploy workflow):
#   REACT_DOMAIN - e.g. "react.test.skuld-options.com"
#   TRAEFIK_ENTRYPOINT - "web" or "websecure"
#   POSTGRES_HOST, POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, POSTGRES_PORT
#
# Usage:
#   docker compose -f docker-compose.react.yml up --build

services:
  # --- FastAPI Backend (REST API) ---
  skuld-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: skuld-api
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-Skuld}
    restart: unless-stopped
    networks:
      - web
      - postgres_setup_default

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.skuld-api.rule=Host(`${REACT_DOMAIN:-react.test.skuld-options.com}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.skuld-api.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.skuld-api.loadbalancer.server.port=8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- React/Next.js Frontend ---
  skuld-react:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=
    container_name: skuld-react
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - web

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.skuld-react.rule=Host(`${REACT_DOMAIN:-react.test.skuld-options.com}`)"
      - "traefik.http.routers.skuld-react.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.skuld-react.loadbalancer.server.port=3000"
      # No Authelia middleware - React has its own JWT auth
      - "traefik.http.routers.skuld-react.priority=1"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  web:
    external: true
  postgres_setup_default:
    external: true
